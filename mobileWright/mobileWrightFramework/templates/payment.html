<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment - MobileWright Travel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h2>Payment Details</h2>
    <form method="post">
        <label>Card Number: <input type="text" name="card_number" required></label><br>
        <label>Expiry: <input type="text" name="expiry" placeholder="MM/YY" required></label><br>
        <label>CVV: <input type="password" name="cvv" required></label><br>
        <button type="submit">Finish & Get Report</button>
    </form>
    <a href="/logout">Logout</a>
</body>
</html>
